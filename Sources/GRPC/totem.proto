syntax = "proto3";

package totem.v1;

// ── Seer hosts this — Totems call it to join the network ────────────────────
service TotemRegistration {
  rpc Register            (RegisterRequest)            returns (RegisterResponse);
  rpc Heartbeat           (HeartbeatRequest)           returns (HeartbeatResponse);
  rpc UpdateAvailability  (AvailabilityUpdateRequest)  returns (AvailabilityUpdateResponse);
  // Bidirectional session: Totem holds the connection, Seer sends requests over it.
  // Totem opens this after Register succeeds and keeps it alive with Ping messages.
  rpc Session (stream TotemSessionMessage) returns (stream TotemSessionMessage);
}

message RegisterRequest {
  string totem_id  = 1;
  string host      = 2;
  int32  grpc_port = 3;
  int32  http_port = 4;   // Totem's HTTP/REST port (for proxy forwarding)
}

message RegisterResponse {
  bool   accepted      = 1;
  string mothership_id = 2;
}

message HeartbeatRequest  { string totem_id = 1; }
message HeartbeatResponse { bool   alive    = 1; }

message AvailabilityUpdateRequest {
  string totem_id          = 1;
  bool   accepting_storage = 2;
}

message AvailabilityUpdateResponse {
  bool acknowledged = 1;
}

// ── Totem hosts this — Seer calls it for search/index/remove fan-out ────────
service TotemQuery {
  rpc Search (TotemSearchRequest) returns (TotemSearchResponse);
  rpc Index  (TotemIndexRequest)  returns (TotemIndexResponse);
  rpc Remove (TotemRemoveRequest) returns (TotemRemoveResponse);
}

// ── Totem hosts this — Seer calls it to update groups/documents + fetch stats
service TotemUpdate {
  rpc UpdateGroup    (TotemUpdateGroupRequest)    returns (TotemUpdateGroupResponse);
  rpc UpdateDocument (TotemUpdateDocumentRequest) returns (TotemUpdateDocumentResponse);
  rpc Stats          (TotemStatsRequest)          returns (TotemStatsResponse);
}

message TotemSearchRequest {
  repeated float  query_embedding     = 1;
  repeated float  query_tag_embedding = 2;
  string          owner_id            = 3;
  string          scope               = 4;
  int32           top_k               = 5;
  repeated string group_ids           = 6;
  bool            aggregate           = 7;
  string          query_text          = 8;  // raw query; Totem embeds if query_embedding is empty
}

message TotemSearchResponse {
  repeated TotemPartitionResult results = 1;
}

message TotemPartitionResult {
  string totem_id      = 1;
  string partition_id  = 2;
  string document_id   = 3;
  string owner_id      = 4;
  string text          = 5;
  float  score         = 6;
  int32  shard_index   = 7;
}

message TotemIndexRequest {
  string                owner_id    = 1;
  string                group_id    = 2;
  string                group_label = 3;
  string                scope       = 4;
  repeated TotemIndexItem items     = 5;
}

message TotemIndexItem {
  string          document_id = 1;
  repeated string texts       = 2;
  repeated string tags        = 3;
  string          name        = 4;
  bytes           metadata    = 5;
  string          media_type  = 6;
}

message TotemIndexResponse {
  bool            success       = 1;
  int32           indexed_count = 2;
  repeated string full_cids     = 3;
}

message TotemRemoveRequest {
  string          owner_id     = 1;
  repeated string document_ids = 2;
}

message TotemRemoveResponse {
  bool  success       = 1;
  int32 removed_count = 2;
}

message TotemUpdateGroupRequest {
  string owner_id          = 1;
  string group_id          = 2;
  string access            = 3;  // "available" | "restricted" | "" (no change)
  string label             = 4;  // "" = no change
  string group_description = 5;  // only applied when update_metadata = true
  repeated string tags     = 6;  // only applied when update_metadata = true
  bool update_metadata     = 7;  // when true, replaces description + tags
}

message TotemUpdateGroupResponse {
  bool   success  = 1;
  string group_id = 2;
}

message TotemUpdateDocumentRequest {
  string owner_id    = 1;
  string document_id = 2;
  string access      = 3;   // "available" | "restricted" | "" (no change)
  string group_id    = 4;   // move to this group; "" = no change
}

message TotemUpdateDocumentResponse {
  bool   success     = 1;
  string document_id = 2;
}

message TotemStatsRequest {}

message TotemStatsResponse {
  int64 document_count          = 1;
  int64 group_count             = 2;
  int64 owner_count             = 3;
  int64 available_document_count = 4;
}

// ── Totem hosts this — Seer calls it for library fan-out ─────────────────────
service TotemLibrary {
  rpc Library (TotemLibraryRequest) returns (TotemLibraryResponse);
}

message TotemDocument {
  string id         = 1;
  string url        = 2;
  string owner_id   = 3;
  string name       = 4;
  int64  created_at = 5;
}

message TotemGroup {
  string                 id              = 1;
  string                 label           = 2;
  string                 owner_id        = 3;
  repeated TotemDocument documents       = 4;
  string                 access          = 5;
  double                 total_earnings  = 6;
  string                 group_description = 7;
  repeated string        tags            = 8;
}

message TotemLibraryRequest {
  string owner_id          = 1;
  bool   include_available = 2;
  int32  limit             = 3;  // 0 = no limit (return all)
  string after_id          = 4;  // cursor: return groups with id > after_id (sorted); empty = start
  string totem_id          = 5;  // UUID of this Totem node; set by Seer for logging/validation
  repeated string document_ids = 6;  // when non-empty, filter to groups containing these docs
}

message TotemLibraryResponse {
  repeated TotemGroup groups   = 1;
  bool                has_more = 2;  // true if more pages follow
}

// ── Totem hosts this — Seer calls it for HNSW proxy routes ───────────────────
service TotemHNSW {
  rpc Stats      (TotemHNSWStatsRequest)      returns (TotemHNSWStatsResponse);
  rpc Graph      (TotemHNSWGraphRequest)      returns (TotemHNSWGraphResponse);
  rpc NodeBatch  (TotemHNSWNodeBatchRequest)  returns (TotemHNSWNodeBatchResponse);
  rpc Node       (TotemHNSWNodeRequest)       returns (TotemHNSWNodeResponse);
  rpc DeleteNode (TotemHNSWDeleteNodeRequest) returns (TotemHNSWDeleteNodeResponse);
}

// owner_id + empty document_id → per-owner stats
// owner_id + non-empty document_id → per-document stats
message TotemHNSWStatsRequest {
  string owner_id    = 1;
  string document_id = 2;
}

message TotemHNSWGraphStats {
  int32 live_nodes  = 1;
  int32 max_level   = 2;
  bool  is_trained  = 3;
  int32 shard_count = 4;
}

message TotemHNSWStatsResponse {
  TotemHNSWGraphStats personal = 1;
  TotemHNSWGraphStats global   = 2;
}

// scope: "personal" | "global" | "documents"
// shard_index: -1 = all shards, ≥ 0 = specific shard
message TotemHNSWGraphRequest {
  string          owner_id     = 1;
  string          scope        = 2;
  bool            hubs_only    = 3;
  int32           shard_index  = 4;
  string          document_id  = 5;
  repeated string document_ids = 6;
}

message TotemHNSWNode {
  string          partition_id      = 1;
  string          document_id       = 2;
  string          document_url      = 3;
  string          document_owner_id = 4;
  string          text              = 5;
  int32           level             = 6;
  repeated string neighbor_ids      = 7;
  bool            is_deleted        = 8;
  bytes           metadata          = 9;
}

message TotemHNSWGraphResponse {
  repeated TotemHNSWNode nodes       = 1;
  int32                  total_nodes = 2;
  int32                  live_nodes  = 3;
  int32                  max_level   = 4;
  int32                  shard_index = 5;
  int32                  shard_count = 6;
}

message TotemHNSWNodeBatchRequest {
  repeated string partition_ids = 1;
}

message TotemHNSWNodeBatchResponse {
  repeated TotemHNSWNode nodes = 1;
}

message TotemHNSWNodeRequest {
  string partition_id = 1;
}

message TotemHNSWNodeResponse {
  TotemHNSWNode node = 1;
}

message TotemHNSWDeleteNodeRequest {
  string owner_id     = 1;
  string partition_id = 2;
}

message TotemHNSWDeleteNodeResponse {
  bool   removed     = 1;
  string document_id = 2;
}

// ── Session envelope — used by the bidirectional Session RPC ─────────────────
// Totem sends pings and response payloads; Seer sends request payloads.
// correlation_id ties each request to its response.
// totem_id is set by Totem on every Ping so Seer can identify the stream.
message TotemSessionMessage {
  string correlation_id = 1;
  string totem_id       = 2;

  oneof payload {
    TotemSessionPing             ping                      = 3;
    TotemSessionPong             pong                      = 4;
    TotemSearchRequest           search_request            = 5;
    TotemSearchResponse          search_response           = 6;
    TotemIndexRequest            index_request             = 7;
    TotemIndexResponse           index_response            = 8;
    TotemRemoveRequest           remove_request            = 9;
    TotemRemoveResponse          remove_response           = 10;
    TotemLibraryRequest          library_request           = 11;
    TotemLibraryResponse         library_response          = 12;
    TotemHNSWStatsRequest        hnsw_stats_request        = 13;
    TotemHNSWStatsResponse       hnsw_stats_response       = 14;
    TotemHNSWGraphRequest        hnsw_graph_request        = 15;
    TotemHNSWGraphResponse       hnsw_graph_response       = 16;
    TotemHNSWNodeBatchRequest    hnsw_node_batch_request   = 17;
    TotemHNSWNodeBatchResponse   hnsw_node_batch_response  = 18;
    TotemHNSWNodeRequest         hnsw_node_request         = 19;
    TotemHNSWNodeResponse        hnsw_node_response        = 20;
    TotemHNSWDeleteNodeRequest   hnsw_delete_node_request  = 21;
    TotemHNSWDeleteNodeResponse  hnsw_delete_node_response = 22;
    TotemUpdateGroupRequest      update_group_request      = 23;
    TotemUpdateGroupResponse     update_group_response     = 24;
    TotemUpdateDocumentRequest   update_document_request   = 25;
    TotemUpdateDocumentResponse  update_document_response  = 26;
    TotemStatsRequest            stats_request             = 27;
    TotemStatsResponse           stats_response            = 28;
  }
}

message TotemSessionPing {}
message TotemSessionPong {}
