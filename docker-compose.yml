version: '3.8'

services:
  seer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"  # change left side to expose on different host port
      - "9090:9090"  # gRPC port for Seer fan-out (search/index/remove)
    restart: unless-stopped
    volumes:
      - totem-volume-dev:/root/Documents/totem-db
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  totem-volume-dev:
    external: true